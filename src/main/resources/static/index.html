<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Management Backend</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 1200px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .auth-section {
            display: none;
            background: #f8f9fa;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .auth-section.active {
            display: block;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .auth-tab {
            padding: 10px 20px;
            border: none;
            background: #e9ecef;
            cursor: pointer;
            border-radius: 5px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .auth-tab.active {
            background: #2d2d2d;
            color: white;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #2d2d2d;
            box-shadow: 0 0 0 3px rgba(45, 45, 45, 0.1);
        }

        button {
            background: #2d2d2d;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        button:hover {
            background: #1a1a1a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(45, 45, 45, 0.5);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #2d2d2d;
            padding-bottom: 10px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #e9ecef;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #ddd;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f0f0f0;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-todo {
            background: #ff4444;
            color: white;
        }

        .status-in-progress {
            background: #ffdd00;
            color: #333;
        }

        .status-done {
            background: #44aa44;
            color: white;
        }

        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: #e0e0e0;
            color: #2d2d2d;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            margin-left: 5px;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f0f0f0;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .user-info span {
            font-weight: 600;
            color: #333;
        }

        .btn-logout {
            background: #d63031;
        }

        .btn-logout:hover {
            background: #a72834;
        }

        .btn-admin {
            background: #2d3436;
            margin-left: 10px;
        }

        .btn-admin:hover { background: #1e272e }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Project Management System</h1>
            <p>Complete backend solution with authentication, projects, tasks, and dashboard</p>
        </div>

        <div class="content">
            <!-- Authentication Section -->
            <div id="authSection" class="auth-section active">
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchAuthTab('signup')">Sign Up</button>
                    <button class="auth-tab" onclick="switchAuthTab('login')">Login</button>
                </div>

                <div id="message" class="message"></div>

                <!-- Signup Form -->
                <div id="signupForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="signupFullName" placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="signupUsername" placeholder="Choose a username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signupPassword" placeholder="Enter a strong password">
                    </div>
                    <button onclick="signup()">Sign Up</button>
                </div>

                <!-- Login Form -->
                <div id="loginForm" style="display: none;">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="loginUsername" placeholder="Enter your username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                    </div>
                    <button onclick="login()">Login</button>
                </div>
            </div>

            <!-- Dashboard Section -->
            <div id="dashboardSection" class="dashboard">
                <div class="user-info">
                    <span id="userDisplay">Welcome, User!</span>
                    <div>
                        <button id="adminBtn" class="btn-admin" style="display:none;" onclick="showAdminPanel()">Admin Panel</button>
                        <button class="btn-logout" onclick="logout()">Logout</button>
                    </div>
                </div>

                <div id="message" class="message"></div>

                <!-- Dashboard Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Projects</h3>
                        <div class="value" id="totalProjects">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Tasks To Do</h3>
                        <div class="value" id="tasksTodo">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>In Progress</h3>
                        <div class="value" id="tasksInProgress">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Completed</h3>
                        <div class="value" id="tasksDone">0</div>
                    </div>
                </div>

                <!-- Create Project Section -->
                <div class="section">
                    <h2>Create New Project</h2>
                    <div class="form-row">
                        <div>
                            <label>Project Identifier</label>
                            <input type="text" id="projectId" placeholder="e.g., PROJ (4-5 chars)" maxlength="5">
                        </div>
                        <div>
                            <label>Project Name</label>
                            <input type="text" id="projectName" placeholder="Enter project name">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Member Usernames</label>
                        <textarea id="projectMembers" placeholder="Comma-separated usernames for the project team" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="projectDescription" placeholder="Describe the project" rows="2"></textarea>
                    </div>
                    <div class="form-row">
                        <div>
                            <label>Start Date</label>
                            <input type="date" id="projectStartDate">
                        </div>
                        <div>
                            <label>End Date</label>
                            <input type="date" id="projectEndDate">
                        </div>
                    </div>
                    <button onclick="createProject()">Create Project</button>
                </div>

                <!-- Projects List -->
                <div class="section">
                    <h2>Your Projects</h2>
                    <div id="projectsList"></div>
                </div>

                <!-- Create Task Section -->
                <div class="section">
                    <h2>Create New Task</h2>
                    <div class="form-row">
                        <div>
                            <label>Select Project</label>
                            <select id="taskProjectId">
                                <option value="">-- Choose a project --</option>
                            </select>
                        </div>
                        <div>
                            <label>Task Title</label>
                            <input type="text" id="taskTitle" placeholder="Enter task title">
                        </div>
                    </div>
                    <div class="form-row">
                        <div>
                            <label>Assign To</label>
                            <select id="taskAssignee">
                                <option value="">-- Choose a project first --</option>
                            </select>
                        </div>
                        <div>
                            <label>Status</label>
                            <select id="taskStatus">
                                <option value="TODO">To Do</option>
                                <option value="IN_PROGRESS">In Progress</option>
                                <option value="DONE">Done</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="taskDescription" placeholder="Describe the task" rows="2"></textarea>
                    </div>
                    <div class="form-row">
                        <div>
                            <label>Due Date</label>
                            <input type="date" id="taskDueDate">
                        </div>
                    </div>
                    <button onclick="createTask()">Create Task</button>
                </div>

                <!-- Tasks List -->
                <div class="section">
                    <h2>All Tasks</h2>
                    <div id="tasksList"></div>
                </div>

                <!-- Admin Management Section -->
                <div id="adminSection" class="section" style="display:none;">
                    <h2>Admin: Manage Users</h2>
                    <div id="usersList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api';
        let token = localStorage.getItem('token');
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let projects = [];
        let tasks = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (token && currentUser) {
                showDashboard();
                loadDashboard();
            }
        });

        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('[id$="Form"]').forEach(f => f.style.display = 'none');

            if (tab === 'signup') {
                document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
                document.getElementById('signupForm').style.display = 'block';
            } else {
                document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
                document.getElementById('loginForm').style.display = 'block';
            }
        }

        async function signup() {
            const fullName = document.getElementById('signupFullName').value;
            const username = document.getElementById('signupUsername').value;
            const password = document.getElementById('signupPassword').value;

            if (!fullName || !username || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    token = data.token;
                    currentUser = { username: data.username, fullName: data.fullName, role: data.role };
                    localStorage.setItem('token', token);
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    showMessage('Signup successful! Welcome to the dashboard.', 'success');
                    setTimeout(() => showDashboard(), 1000);
                } else {
                    showMessage(data.message || 'Signup failed', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    token = data.token;
                    currentUser = { username: data.username, fullName: data.fullName, role: data.role };
                    localStorage.setItem('token', token);
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    showMessage('Login successful!', 'success');
                    setTimeout(() => showDashboard(), 1000);
                } else {
                    showMessage(data.message || 'Login failed', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        function showDashboard() {
            document.getElementById('authSection').classList.remove('active');
            document.getElementById('dashboardSection').classList.add('active');
            document.getElementById('userDisplay').textContent = `Welcome, ${currentUser.fullName}! (${currentUser.role})`;
            // show admin button if user is admin
            if (currentUser && currentUser.role === 'ADMIN') {
                document.getElementById('adminBtn').style.display = 'inline-block';
            } else {
                document.getElementById('adminBtn').style.display = 'none';
            }
        }

        function logout() {
            token = null;
            currentUser = null;
            localStorage.removeItem('token');
            localStorage.removeItem('currentUser');
            document.getElementById('authSection').classList.add('active');
            document.getElementById('dashboardSection').classList.remove('active');
            document.getElementById('signupForm').style.display = 'block';
            document.getElementById('loginForm').style.display = 'none';
            showMessage('Logged out successfully', 'success');
        }

        async function loadDashboard() {
            try {
                // Load dashboard summary
                const summaryResponse = await fetch(`${API_URL}/dashboard/summary`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const summary = await summaryResponse.json();
                document.getElementById('totalProjects').textContent = summary.totalProjects || 0;
                document.getElementById('tasksTodo').textContent = summary.todoTasks || 0;
                document.getElementById('tasksInProgress').textContent = summary.inProgressTasks || 0;
                document.getElementById('tasksDone').textContent = summary.doneTasks || 0;

                // Load projects
                await loadProjects();
                
                // Load tasks
                await loadTasks();
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        async function loadProjects() {
            try {
                const response = await fetch(`${API_URL}/projects`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                projects = response.ok ? await response.json() : [];
                
                // Update project selector
                const select = document.getElementById('taskProjectId');
                select.innerHTML = '<option value="">-- Choose a project --</option>';
                projects.forEach(p => {
                    select.innerHTML += `<option value="${p.projectIdentifier}">${p.projectIdentifier} - ${p.projectName}</option>`;
                });

                refreshTaskAssignees();

                // Display projects
                const list = document.getElementById('projectsList');
                if (projects.length === 0) {
                    list.innerHTML = '<div class="empty-state">No projects yet. Create one to get started!</div>';
                } else {
                    list.innerHTML = projects.map(p => `
                        <div style="padding: 15px; background: white; border-radius: 5px; margin-bottom: 10px;">
                            <strong>${p.projectIdentifier} - ${p.projectName}</strong>
                            <p style="margin: 5px 0; color: #666;">${p.description || 'No description'}</p>
                            <small style="color: #999;">Created: ${new Date(p.createdAt).toLocaleDateString()}</small>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading projects:', error);
            }
        }

        async function loadTasks() {
            try {
                const response = await fetch(`${API_URL}/tasks`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                tasks = response.ok ? await response.json() : [];

                const visibleTasks = currentUser && currentUser.role === 'MEMBER'
                    ? tasks.filter(t => !t.assigneeUsername || t.assigneeUsername === currentUser.username)
                    : tasks;

                const list = document.getElementById('tasksList');
                if (visibleTasks.length === 0) {
                    list.innerHTML = '<div class="empty-state">No tasks yet. Create one!</div>';
                } else {
                    list.innerHTML = '<table><thead><tr><th>Title</th><th>Status</th><th>Due Date</th><th>Project</th><th>Actions</th></tr></thead><tbody>' +
                        visibleTasks.map(t => {
                            const statusClass = `status-${t.status.toLowerCase().replace('_', '-')}`;
                            const statusText = t.status === 'IN_PROGRESS' ? 'In Progress' : t.status;
                            const projectId = t.projectIdentifier || 'N/A';
                            // find project and its members
                            const project = projects.find(p => p.projectIdentifier === projectId);
                            const members = project ? (project.members || []) : [];
                            let assignHtml = '';
                            if (currentUser && currentUser.role === 'ADMIN') {
                                assignHtml = `<select onchange="assignTask('${t.id}', this.value)">` +
                                    `<option value="">Unassigned</option>` +
                                    members.map(m => `<option value="${m}" ${t.assigneeUsername===m? 'selected':''}>${m}</option>`).join('') +
                                    `</select>`;
                            } else {
                                assignHtml = t.assigneeUsername || 'Unassigned';
                            }

                            return `<tr>
                                <td><strong>${t.title}</strong></td>
                                <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                                <td>${t.dueDate || 'N/A'}</td>
                                <td>${projectId}</td>
                                <td class="action-buttons">
                                    <button class="btn-small" onclick="updateTaskStatus('${t.id}', 'IN_PROGRESS')">Start</button>
                                    <button class="btn-small" onclick="updateTaskStatus('${t.id}', 'DONE')">Complete</button>
                                    ${assignHtml}
                                </td>
                            </tr>`;
                        }).join('') + '</tbody></table>';
                }
            } catch (error) {
                console.error('Error loading tasks:', error);
            }
        }

        async function createProject() {
            const projectIdentifier = document.getElementById('projectId').value.toUpperCase();
            const projectName = document.getElementById('projectName').value;
            const projectMembers = document.getElementById('projectMembers').value;
            const description = document.getElementById('projectDescription').value;
            const startDate = document.getElementById('projectStartDate').value;
            const endDate = document.getElementById('projectEndDate').value;

            if (!projectIdentifier || !projectName) {
                showMessage('Please fill in project identifier and name', 'error');
                return;
            }

            if (!description || description.trim() === '') {
                showMessage('Please provide a project description (required)', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/project`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        projectIdentifier,
                        projectName,
                        memberUsernames: projectMembers ? projectMembers.split(',').map(value => value.trim()).filter(Boolean) : [],
                        description,
                        startDate,
                        endDate
                    })
                });

                if (response.ok) {
                    showMessage('Project created successfully!', 'success');
                    document.getElementById('projectId').value = '';
                    document.getElementById('projectName').value = '';
                    document.getElementById('projectMembers').value = '';
                    document.getElementById('projectDescription').value = '';
                    document.getElementById('projectStartDate').value = '';
                    document.getElementById('projectEndDate').value = '';
                    loadProjects();
                    loadDashboard();
                } else {
                    let errorText = 'Failed to create project';
                    try {
                        const error = await response.json();
                        if (error.message) errorText = error.message;
                        else if (typeof error === 'object') errorText = JSON.stringify(error);
                    } catch (e) {}
                    showMessage(errorText, 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        async function createTask() {
            const projectId = document.getElementById('taskProjectId').value;
            const title = document.getElementById('taskTitle').value;
            const description = document.getElementById('taskDescription').value;
            const dueDate = document.getElementById('taskDueDate').value;
            const status = document.getElementById('taskStatus').value;
            const assigneeUsername = document.getElementById('taskAssignee').value;

            if (!projectId || !title) {
                showMessage('Please select a project and enter a title', 'error');
                return;
            }

            if (!description || description.trim() === '') {
                showMessage('Please provide a task description (required)', 'error');
                return;
            }

            if (!dueDate) {
                showMessage('Please set a due date for the task (required)', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/tasks`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        projectIdentifier: projectId,
                        title,
                        description,
                        dueDate,
                        status,
                        assigneeUsername
                    })
                });

                if (response.ok) {
                    showMessage('Task created successfully!', 'success');
                    document.getElementById('taskTitle').value = '';
                    document.getElementById('taskDescription').value = '';
                    document.getElementById('taskDueDate').value = '';
                    document.getElementById('taskStatus').value = 'TODO';
                    document.getElementById('taskAssignee').innerHTML = '<option value="">-- Choose a project first --</option>';
                    loadTasks();
                    loadDashboard();
                } else {
                    let errorText = 'Failed to create task';
                    try {
                        const error = await response.json();
                        if (error.message) errorText = error.message;
                        else if (typeof error === 'object') errorText = JSON.stringify(error);
                    } catch (e) {}
                    showMessage(errorText, 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        // Admin panel functions
        function showAdminPanel() {
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('dashboardSection').style.display = 'none';
            loadUsersForAdmin();
        }

        function hideAdminPanel() {
            document.getElementById('adminSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
        }

        async function loadUsersForAdmin() {
            try {
                const resp = await fetch(`${API_URL}/users`, { headers: { 'Authorization': `Bearer ${token}` } });
                const users = resp.ok ? await resp.json() : [];
                const container = document.getElementById('usersList');
                if (users.length === 0) {
                    container.innerHTML = '<div class="empty-state">No users found.</div>';
                    return;
                }

                container.innerHTML = '<table><thead><tr><th>Username</th><th>Full Name</th><th>Role</th><th>Action</th></tr></thead><tbody>' +
                    users.map(u => {
                        return `<tr>
                            <td>${u.username}</td>
                            <td>${u.fullName}</td>
                            <td id="role-${u.id}">${u.role}</td>
                            <td>
                                <button onclick="changeUserRole('${u.id}','ADMIN')">Promote</button>
                                <button onclick="changeUserRole('${u.id}','MEMBER')">Demote</button>
                            </td>
                        </tr>`;
                    }).join('') + '</tbody></table>';
            } catch (e) {
                console.error(e);
            }
        }

        async function changeUserRole(userId, role) {
            try {
                const resp = await fetch(`${API_URL}/users/${userId}/role`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ role })
                });
                if (resp.ok) {
                    const updated = await resp.json();
                    document.getElementById(`role-${updated.id}`).textContent = updated.role;
                    showMessage('User role updated', 'success');
                } else {
                    showMessage('Failed to update role', 'error');
                }
            } catch (e) {
                showMessage('Error: ' + e.message, 'error');
            }
        }

        async function updateTaskStatus(taskId, status) {
            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status })
                });

                if (response.ok) {
                    showMessage('Task updated successfully!', 'success');
                    loadTasks();
                    loadDashboard();
                } else {
                    showMessage('Failed to update task', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        async function assignTask(taskId, assigneeUsername) {
            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ assigneeUsername })
                });

                if (response.ok) {
                    showMessage('Task assignment updated!', 'success');
                    loadTasks();
                    loadDashboard();
                } else {
                    showMessage('Failed to assign task', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        function refreshTaskAssignees() {
            const projectId = document.getElementById('taskProjectId').value;
            const select = document.getElementById('taskAssignee');
            const project = projects.find(p => p.projectIdentifier === projectId);
            const members = project ? (project.members || []) : [];

            if (!project || members.length === 0) {
                select.innerHTML = '<option value="">-- Choose a project first --</option>';
                return;
            }

            const current = select.value;
            select.innerHTML = '<option value="">Unassigned</option>' +
                members.map(member => `<option value="${member}">${member}</option>`).join('');
            select.value = current;
        }

        document.getElementById('taskProjectId').addEventListener('change', refreshTaskAssignees);

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = `message show ${type}`;
            setTimeout(() => {
                messageDiv.classList.remove('show');
            }, 4000);
        }
    </script>
</body>
</html>
